services:
  postgres:
    image: postgres:18-alpine
    container_name: fruits-postgres
    environment:
      POSTGRES_DB: fruits
      POSTGRES_USER: fruits
      POSTGRES_PASSWORD: fruits
    ports:
      - "5432:5432"
    volumes:
      - ./db.sql:/docker-entrypoint-initdb.d/01-db.sql:ro
    cpus: ${POSTGRES_CPU_LIMIT:-2.0}
    cpuset: "${POSTGRES_CPUSET:-0-1}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fruits -d fruits"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
