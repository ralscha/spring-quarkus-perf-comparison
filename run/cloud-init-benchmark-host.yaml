#cloud-config
package_update: false
package_upgrade: false

write_files:
  - path: /usr/local/bin/bootstrap-benchmark-host.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      export HOME=/root
      export DEBIAN_FRONTEND=noninteractive
      export JAVA_HOME=/opt/java/openjdk-25
      export GOPATH=/opt/go
      export GOMODCACHE="${GOPATH}/pkg/mod"
      export GOCACHE=/var/cache/go-build
      export PATH="${JAVA_HOME}/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

      BENCH_ROOT=/opt/benchmarks
      COMPOSE_DIR="${BENCH_ROOT}/postgres"
      REPO_DIR="${BENCH_ROOT}/spring-quarkus-perf-comparison"
      BOOTSTRAP_LOG_DIR="${BENCH_ROOT}/bootstrap-logs"
      LOG_FILE=/var/log/bootstrap-benchmark-host.log
      RUNNER_SCRIPT=/usr/local/bin/run-benchmarks.sh
      export POSTGRES_CPU_LIMIT=2.0
      export POSTGRES_CPUSET=0-1
      export APP_CPUSET=2-5
      export APP_CPU_COUNT=4
      export K6_CPUSET=6-7
      export K6_VUS=${K6_VUS:-100}
      export K6_WARMUP_RAMP_UP_SECONDS=${K6_WARMUP_RAMP_UP_SECONDS:-20}
      export K6_WARMUP_HOLD_SECONDS=${K6_WARMUP_HOLD_SECONDS:-40}
      export K6_WARMUP_RAMP_DOWN_SECONDS=${K6_WARMUP_RAMP_DOWN_SECONDS:-10}
      export K6_MEASURED_HOLD_SECONDS=${K6_MEASURED_HOLD_SECONDS:-20}
      export K6_GRACEFUL_RAMP_DOWN_SECONDS=${K6_GRACEFUL_RAMP_DOWN_SECONDS:-15}
      export K6_GRACEFUL_STOP_SECONDS=${K6_GRACEFUL_STOP_SECONDS:-15}
      GO_BENCH_ENV="GOMAXPROCS=${APP_CPU_COUNT} GOMEMLIMIT=5GiB"

      exec > >(tee -a "${LOG_FILE}") 2>&1

      log_postgres_diagnostics() {
        echo "[$(date --iso-8601=seconds)] PostgreSQL container diagnostics" >&2
        docker compose -f "${COMPOSE_DIR}/docker-compose.yml" ps >&2 || true
        docker compose -f "${COMPOSE_DIR}/docker-compose.yml" logs --no-color --tail=200 postgres >&2 || true
      }

      wait_for_postgres() {
        local timeout_seconds="${1:-180}"
        local waited_seconds=0
        local status

        until docker compose -f "${COMPOSE_DIR}/docker-compose.yml" exec -T postgres pg_isready -U fruits -d fruits >/dev/null 2>&1; do
          status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' fruits-postgres 2>/dev/null || true)

          case "${status}" in
            healthy)
              return 0
              ;;
            unhealthy|exited|dead)
              echo "[$(date --iso-8601=seconds)] PostgreSQL became ${status} before accepting connections" >&2
              log_postgres_diagnostics
              return 1
              ;;
          esac

          if [ "${waited_seconds}" -ge "${timeout_seconds}" ]; then
            echo "[$(date --iso-8601=seconds)] Timed out waiting ${timeout_seconds}s for PostgreSQL to become ready" >&2
            log_postgres_diagnostics
            return 1
          fi

          sleep 2
          waited_seconds=$((waited_seconds + 2))
        done
      }

      tune_host_for_benchmarks() {
        echo "[$(date --iso-8601=seconds)] Applying host benchmark tuning"

        if command -v swapon >/dev/null 2>&1 && swapon --noheadings --show=name | grep -q .; then
          swapoff -a || true
        fi

        cat > /etc/sysctl.d/99-benchmark-host.conf <<'EOF'
      vm.swappiness=1
      kernel.numa_balancing=0
      EOF
        sysctl --system >/dev/null 2>&1 || true

        local governor_applied=false
        for governor_file in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          if [ ! -w "${governor_file}" ]; then
            continue
          fi

          echo performance > "${governor_file}" || true
          governor_applied=true
        done

        if [ "${governor_applied}" = true ]; then
          echo "[$(date --iso-8601=seconds)] CPU frequency governor set to performance where supported"
        else
          echo "[$(date --iso-8601=seconds)] CPU frequency governor control not available on this host"
        fi
      }

      wait_for_server() {
        local pid_file="$1"
        for _ in $(seq 1 90); do
          if curl -fsS http://127.0.0.1:8080/fruits >/dev/null 2>&1; then
            return 0
          fi

          if [ -f "${pid_file}" ]; then
            local server_pid
            server_pid=$(cat "${pid_file}")
            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              echo "Go profiling process exited before becoming ready" >&2
              return 1
            fi
          fi

          sleep 2
        done

        echo "Go profiling process did not become ready in time" >&2
        return 1
      }

      stop_server() {
        local pid_file="$1"
        if [ ! -f "${pid_file}" ]; then
          return 0
        fi

        local server_pid
        server_pid=$(cat "${pid_file}")
        if kill -0 "${server_pid}" >/dev/null 2>&1; then
          kill "${server_pid}" >/dev/null 2>&1 || true
          wait "${server_pid}" >/dev/null 2>&1 || true
        fi
        rm -f "${pid_file}"
      }

      prepare_go_pgo_binary() {
        local workdir="${REPO_DIR}/go"
        local pid_file="${BOOTSTRAP_LOG_DIR}/go-pgo-profile.pid"
        local server_log="${BOOTSTRAP_LOG_DIR}/go-pgo-profile.log"
        local k6_log="${BOOTSTRAP_LOG_DIR}/go-pgo-profile-k6.txt"
        local profile_path="${workdir}/server.pprof"

        cleanup_go_pgo() {
          stop_server "${pid_file}"
          docker compose -f "${COMPOSE_DIR}/docker-compose.yml" down >/dev/null 2>&1 || true
        }

        trap cleanup_go_pgo RETURN

        echo "[$(date --iso-8601=seconds)] Generating Go PGO profile during bootstrap"
        echo "[$(date --iso-8601=seconds)] CPU topology: postgres=${POSTGRES_CPUSET} app=${APP_CPUSET} k6=${K6_CPUSET}"
        install -d "${BOOTSTRAP_LOG_DIR}"
        rm -f "${profile_path}" "${workdir}/server_pgo" "${pid_file}" "${server_log}" "${k6_log}"
        docker compose -f "${COMPOSE_DIR}/docker-compose.yml" up -d --remove-orphans
        wait_for_postgres

        pushd "${workdir}" >/dev/null
        bash -lc "exec taskset --cpu-list ${APP_CPUSET} env ${GO_BENCH_ENV} ./server -cpuprofile ${profile_path}" >"${server_log}" 2>&1 &
        local server_pid=$!
        popd >/dev/null

        printf '%s\n' "${server_pid}" > "${pid_file}"

        wait_for_server "${pid_file}"
        taskset --cpu-list "${K6_CPUSET}" k6 run "${BENCH_ROOT}/stress-k6.js" | tee "${k6_log}"
        stop_server "${pid_file}"

        if [ ! -s "${profile_path}" ]; then
          echo "Go CPU profile was not written to ${profile_path}" >&2
          return 1
        fi

        echo "[$(date --iso-8601=seconds)] Building Go PGO binary during bootstrap"
        pushd "${workdir}" >/dev/null
        env ${GO_BENCH_ENV} go build -pgo="${profile_path}" -o server_pgo .
        popd >/dev/null

        trap - RETURN
        cleanup_go_pgo
      }

      echo "[$(date --iso-8601=seconds)] Updating Debian packages"
      apt-get update
      apt-get -y full-upgrade
      apt-get install -y \
        build-essential \
        ca-certificates \
        curl \
        git \
        gnupg \
        jq \
        lsb-release \
        tar \
        unzip \
        screen \
        xz-utils

      echo "[$(date --iso-8601=seconds)] Configuring Docker and k6 repositories"
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/debian/gpg -o /etc/apt/keyrings/docker.asc
      chmod a+r /etc/apt/keyrings/docker.asc
      . /etc/os-release
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian ${VERSION_CODENAME} stable" \
        > /etc/apt/sources.list.d/docker.list

      curl -fsSL https://dl.k6.io/key.gpg | gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
      chmod a+r /usr/share/keyrings/k6-archive-keyring.gpg
      echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
        > /etc/apt/sources.list.d/k6.list

      apt-get update
      apt-get install -y \
        containerd.io \
        docker-buildx-plugin \
        docker-ce \
        docker-ce-cli \
        docker-compose-plugin \
        k6
      systemctl enable --now docker

      tune_host_for_benchmarks

      DEFAULT_USER=$(awk -F: '$3 >= 1000 && $1 != "nobody" { print $1; exit }' /etc/passwd || true)
      if [ -n "${DEFAULT_USER}" ]; then
        usermod -aG docker "${DEFAULT_USER}" || true
      fi

      echo "[$(date --iso-8601=seconds)] Installing OpenJDK 25"
      rm -rf "${JAVA_HOME}"
      install -d "${JAVA_HOME}"
      curl -fsSL "https://api.adoptium.net/v3/binary/latest/25/ga/linux/x64/jdk/hotspot/normal/eclipse?project=jdk" \
        -o /tmp/openjdk-25.tar.gz
      tar -xzf /tmp/openjdk-25.tar.gz --strip-components=1 -C "${JAVA_HOME}"
      ln -sf "${JAVA_HOME}/bin/java" /usr/local/bin/java
      ln -sf "${JAVA_HOME}/bin/javac" /usr/local/bin/javac
      cat > /etc/profile.d/java25.sh <<'EOF'
      export JAVA_HOME=/opt/java/openjdk-25
      export PATH=$JAVA_HOME/bin:$PATH
      EOF
      java -version

      echo "[$(date --iso-8601=seconds)] Installing Go 1.26.1"
      rm -rf /usr/local/go
      curl -fsSL https://go.dev/dl/go1.26.1.linux-amd64.tar.gz -o /tmp/go1.26.1.linux-amd64.tar.gz
      tar -C /usr/local -xzf /tmp/go1.26.1.linux-amd64.tar.gz
      install -d -m 0755 "${GOPATH}" "${GOMODCACHE}" "${GOCACHE}"
      ln -sf /usr/local/go/bin/go /usr/local/bin/go
      ln -sf /usr/local/go/bin/gofmt /usr/local/bin/gofmt
      cat > /etc/profile.d/go.sh <<'EOF'
      export GOPATH=/opt/go
      export GOMODCACHE=$GOPATH/pkg/mod
      export GOCACHE=/var/cache/go-build
      export PATH=/usr/local/go/bin:$PATH
      EOF
      go version

      if [ ! -d "${REPO_DIR}/.git" ]; then
        echo "[$(date --iso-8601=seconds)] Cloning benchmark repository"
        git clone https://github.com/ralscha/spring-quarkus-perf-comparison.git "${REPO_DIR}"
      else
        echo "[$(date --iso-8601=seconds)] Repository already present at ${REPO_DIR}"
      fi

      echo "[$(date --iso-8601=seconds)] Preparing PostgreSQL Docker Compose assets"
      install -d "${BENCH_ROOT}" "${COMPOSE_DIR}" "${BOOTSTRAP_LOG_DIR}"
      cp "${REPO_DIR}/run/docker-compose.yml" "${COMPOSE_DIR}/docker-compose.yml"
      cp "${REPO_DIR}/run/stress-k6.js" "${BENCH_ROOT}/stress-k6.js"

      echo "[$(date --iso-8601=seconds)] Pulling Docker Compose images"
      docker compose -f "${COMPOSE_DIR}/docker-compose.yml" pull

      find "${REPO_DIR}" -maxdepth 2 -name mvnw -type f -exec chmod +x {} \;

      echo "[$(date --iso-8601=seconds)] Building Go module"
      pushd "${REPO_DIR}/go"
      go build -o server .
      popd

      prepare_go_pgo_binary

      for module in micronaut4 micronaut5 quarkus3 quarkus3-spring-compatibility quarkus3-virtual springboot4; do
        if [ "${module}" = "springboot4" ]; then
          continue
        fi
        echo "[$(date --iso-8601=seconds)] Building ${module}"
        pushd "${REPO_DIR}/${module}"
        ./mvnw -B -DskipTests clean package
        popd
      done

      echo "[$(date --iso-8601=seconds)] Building springboot4 JVM artifact"
      pushd "${REPO_DIR}/springboot4"
      ./mvnw -B -DskipTests clean package
      cp target/springboot4.jar target/app-jvm.jar

      echo "[$(date --iso-8601=seconds)] Building springboot4 AOT JVM artifact"
      ./mvnw -B -DskipTests compile spring-boot:process-aot package
      popd

      echo "[$(date --iso-8601=seconds)] Benchmark host bootstrap complete"
      echo "[$(date --iso-8601=seconds)] Rebooting before benchmark execution. Run ${RUNNER_SCRIPT} after the host comes back."
      sync
      systemctl reboot

  - path: /usr/local/bin/run-benchmarks.sh
    owner: root:root
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      export HOME=/root
      export JAVA_HOME=/opt/java/openjdk-25
      export PATH="${JAVA_HOME}/bin:/usr/local/go/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"

      BENCH_ROOT=/opt/benchmarks
      COMPOSE_DIR="${BENCH_ROOT}/postgres"
      REPO_DIR="${BENCH_ROOT}/spring-quarkus-perf-comparison"
      RESULTS_DIR="${BENCH_ROOT}/results"
      RESULTS_FILE="${RESULTS_DIR}/measured-cycle-summary.tsv"
      RAW_RESULTS_FILE="${RESULTS_DIR}/measured-cycle-runs.tsv"
      LOG_DIR="${RESULTS_DIR}/logs"
      K6_SCRIPT="${BENCH_ROOT}/stress-k6.js"
      export POSTGRES_CPU_LIMIT=2.0
      export POSTGRES_CPUSET=0-1
      export APP_CPUSET=2-5
      export APP_CPU_COUNT=4
      export K6_CPUSET=6-7
      export K6_VUS=${K6_VUS:-100}
      export K6_WARMUP_RAMP_UP_SECONDS=${K6_WARMUP_RAMP_UP_SECONDS:-20}
      export K6_WARMUP_HOLD_SECONDS=${K6_WARMUP_HOLD_SECONDS:-40}
      export K6_WARMUP_RAMP_DOWN_SECONDS=${K6_WARMUP_RAMP_DOWN_SECONDS:-10}
      export K6_MEASURED_HOLD_SECONDS=${K6_MEASURED_HOLD_SECONDS:-20}
      export K6_GRACEFUL_RAMP_DOWN_SECONDS=${K6_GRACEFUL_RAMP_DOWN_SECONDS:-15}
      export K6_GRACEFUL_STOP_SECONDS=${K6_GRACEFUL_STOP_SECONDS:-15}
      BENCHMARK_ROUNDS=${BENCHMARK_ROUNDS:-5}
      BENCHMARK_VARIANCE_WARN_PCT=${BENCHMARK_VARIANCE_WARN_PCT:-5}
      JVM_BENCH_OPTS="-XX:ActiveProcessorCount=${APP_CPU_COUNT} -Xms3g -Xmx5g"
      GO_BENCH_ENV="GOMAXPROCS=${APP_CPU_COUNT} GOMEMLIMIT=5GiB"
      RESULTS_RANKING_FILE="${RESULTS_DIR}/measured-cycle-ranking.tsv"

      mkdir -p "${RESULTS_DIR}" "${LOG_DIR}"
      printf 'round\tframework\tmeasured_cycle_requests\tlatency_p50_ms\tlatency_p95_ms\tlatency_p99_ms\n' > "${RAW_RESULTS_FILE}"
      printf 'framework\tmedian_measured_cycle_requests\tstdev_measured_cycle_requests\tmin_measured_cycle_requests\tmax_measured_cycle_requests\tmedian_latency_p50_ms\tstdev_latency_p50_ms\tmedian_latency_p95_ms\tstdev_latency_p95_ms\tmedian_latency_p99_ms\tstdev_latency_p99_ms\n' > "${RESULTS_FILE}"
      echo "[$(date --iso-8601=seconds)] CPU topology: postgres=${POSTGRES_CPUSET} app=${APP_CPUSET} k6=${K6_CPUSET}"
      echo "[$(date --iso-8601=seconds)] Benchmark rounds: ${BENCHMARK_ROUNDS}"
      echo "[$(date --iso-8601=seconds)] k6 timings: vus=${K6_VUS} warmup=${K6_WARMUP_RAMP_UP_SECONDS}s ramp + ${K6_WARMUP_HOLD_SECONDS}s hold + ${K6_WARMUP_RAMP_DOWN_SECONDS}s rampdown, measured=${K6_MEASURED_HOLD_SECONDS}s constant"
      echo "[$(date --iso-8601=seconds)] Variance warning threshold: ${BENCHMARK_VARIANCE_WARN_PCT}% coefficient of variation"

      case "${BENCHMARK_ROUNDS}" in
        ''|*[!0-9]*)
          echo "BENCHMARK_ROUNDS must be a positive integer" >&2
          exit 1
          ;;
      esac

      if [ "${BENCHMARK_ROUNDS}" -lt 1 ]; then
        echo "BENCHMARK_ROUNDS must be at least 1" >&2
        exit 1
      fi

      case "${BENCHMARK_VARIANCE_WARN_PCT}" in
        ''|*[!0-9]*|0)
          echo "BENCHMARK_VARIANCE_WARN_PCT must be a positive integer" >&2
          exit 1
          ;;
      esac

      tune_host_for_benchmarks() {
        echo "[$(date --iso-8601=seconds)] Re-applying host benchmark tuning"

        if command -v swapon >/dev/null 2>&1 && swapon --noheadings --show=name | grep -q .; then
          swapoff -a || true
        fi

        sysctl -w vm.swappiness=1 >/dev/null 2>&1 || true
        sysctl -w kernel.numa_balancing=0 >/dev/null 2>&1 || true

        local governor_applied=false
        for governor_file in /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor; do
          if [ ! -w "${governor_file}" ]; then
            continue
          fi

          echo performance > "${governor_file}" || true
          governor_applied=true
        done

        if [ "${governor_applied}" = true ]; then
          echo "[$(date --iso-8601=seconds)] CPU frequency governor set to performance where supported"
        else
          echo "[$(date --iso-8601=seconds)] CPU frequency governor control not available on this host"
        fi
      }

      log_postgres_diagnostics() {
        echo "[$(date --iso-8601=seconds)] PostgreSQL container diagnostics" >&2
        docker compose -f "${COMPOSE_DIR}/docker-compose.yml" ps >&2 || true
        docker compose -f "${COMPOSE_DIR}/docker-compose.yml" logs --no-color --tail=200 postgres >&2 || true
      }

      wait_for_postgres() {
        local timeout_seconds="${1:-180}"
        local waited_seconds=0
        local status

        until docker compose -f "${COMPOSE_DIR}/docker-compose.yml" exec -T postgres pg_isready -U fruits -d fruits >/dev/null 2>&1; do
          status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' fruits-postgres 2>/dev/null || true)

          case "${status}" in
            healthy)
              return 0
              ;;
            unhealthy|exited|dead)
              echo "[$(date --iso-8601=seconds)] PostgreSQL became ${status} before accepting connections" >&2
              log_postgres_diagnostics
              return 1
              ;;
          esac

          if [ "${waited_seconds}" -ge "${timeout_seconds}" ]; then
            echo "[$(date --iso-8601=seconds)] Timed out waiting ${timeout_seconds}s for PostgreSQL to become ready" >&2
            log_postgres_diagnostics
            return 1
          fi

          sleep 2
          waited_seconds=$((waited_seconds + 2))
        done
      }

      wait_for_server() {
        local framework="$1"
        for _ in $(seq 1 90); do
          if curl -fsS http://127.0.0.1:8080/fruits >/dev/null 2>&1; then
            return 0
          fi

          if [ -f "${LOG_DIR}/${framework}.pid" ]; then
            local server_pid
            server_pid=$(cat "${LOG_DIR}/${framework}.pid")
            if ! kill -0 "${server_pid}" >/dev/null 2>&1; then
              echo "${framework} exited before becoming ready" >&2
              return 1
            fi
          fi

          sleep 2
        done

        echo "${framework} did not become ready in time" >&2
        return 1
      }

      stop_server() {
        local framework="$1"
        local pid_file="${LOG_DIR}/${framework}.pid"
        if [ ! -f "${pid_file}" ]; then
          return 0
        fi

        local server_pid
        server_pid=$(cat "${pid_file}")
        if kill -0 "${server_pid}" >/dev/null 2>&1; then
          kill "${server_pid}" >/dev/null 2>&1 || true
          wait "${server_pid}" >/dev/null 2>&1 || true
        fi
        rm -f "${pid_file}"
      }

      extract_summary_value() {
        local label="$1"
        local file_path="$2"

        awk -F': ' -v label="${label}" '$1 == label { print $2 }' "${file_path}" | tail -n 1
      }

      sorted_metric_values() {
        local framework="$1"
        local column="$2"

        awk -F'\t' -v framework="${framework}" -v column="${column}" 'NR > 1 && $2 == framework { print $column }' "${RAW_RESULTS_FILE}" | sort -g
      }

      metric_values() {
        local framework="$1"
        local column="$2"

        awk -F'\t' -v framework="${framework}" -v column="${column}" 'NR > 1 && $2 == framework { print $column }' "${RAW_RESULTS_FILE}"
      }

      median_from_sorted_values() {
        awk '
          {
            values[count++] = $1
          }
          END {
            if (count == 0) {
              exit 1
            }

            mid = int(count / 2)
            if (count % 2 == 1) {
              print values[mid]
              exit 0
            }

            printf "%.3f\n", (values[mid - 1] + values[mid]) / 2
          }
        '
      }

      stdev_from_values() {
        awk '
          {
            values[count++] = $1
            sum += $1
          }
          END {
            if (count < 2) {
              print "0.000"
              exit 0
            }

            mean = sum / count
            for (sample_index = 0; sample_index < count; sample_index++) {
              diff = values[sample_index] - mean
              squared_sum += diff * diff
            }

            printf "%.3f\n", sqrt(squared_sum / (count - 1))
          }
        '
      }

      summarize_framework_results() {
        local framework="$1"
        local requests_median
        local requests_stdev
        local requests_min
        local requests_max
        local latency_p50_median
        local latency_p50_stdev
        local latency_p95_median
        local latency_p95_stdev
        local latency_p99_median
        local latency_p99_stdev

        requests_median=$(sorted_metric_values "${framework}" 3 | median_from_sorted_values)
        requests_stdev=$(metric_values "${framework}" 3 | stdev_from_values)
        requests_min=$(sorted_metric_values "${framework}" 3 | head -n 1)
        requests_max=$(sorted_metric_values "${framework}" 3 | tail -n 1)
        latency_p50_median=$(sorted_metric_values "${framework}" 4 | median_from_sorted_values)
        latency_p50_stdev=$(metric_values "${framework}" 4 | stdev_from_values)
        latency_p95_median=$(sorted_metric_values "${framework}" 5 | median_from_sorted_values)
        latency_p95_stdev=$(metric_values "${framework}" 5 | stdev_from_values)
        latency_p99_median=$(sorted_metric_values "${framework}" 6 | median_from_sorted_values)
        latency_p99_stdev=$(metric_values "${framework}" 6 | stdev_from_values)

        printf '%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\t%s\n' \
          "${framework}" \
          "${requests_median}" \
          "${requests_stdev}" \
          "${requests_min}" \
          "${requests_max}" \
          "${latency_p50_median}" \
          "${latency_p50_stdev}" \
          "${latency_p95_median}" \
          "${latency_p95_stdev}" \
          "${latency_p99_median}" \
          "${latency_p99_stdev}" \
          | tee -a "${RESULTS_FILE}"
      }

      build_ranking_report() {
        printf 'rank\tframework\tmedian_requests\trequests_stdev\trequests_cv_pct\tmedian_p95_ms\tp95_stdev\tp95_cv_pct\tvariance_flag\n' > "${RESULTS_RANKING_FILE}"

        awk -F'\t' -v warn_pct="${BENCHMARK_VARIANCE_WARN_PCT}" '
          BEGIN {
            OFS = "\t"
          }
          NR == 1 {
            next
          }
          {
            throughput_cv = ($2 + 0) > 0 ? (($3 + 0) / ($2 + 0)) * 100 : 0
            latency_cv = ($8 + 0) > 0 ? (($9 + 0) / ($8 + 0)) * 100 : 0
            flag = "stable"

            if (throughput_cv >= warn_pct || latency_cv >= warn_pct) {
              flag = "high-variance"
            }

            printf "%s\t%.3f\t%.3f\t%.2f\t%.3f\t%.3f\t%.2f\t%s\n", $1, $2 + 0, $3 + 0, throughput_cv, $8 + 0, $9 + 0, latency_cv, flag
          }
        ' "${RESULTS_FILE}" | sort -t "$(printf '\t')" -k2,2gr | awk -F'\t' 'BEGIN { OFS = "\t" } { print NR, $0 }' >> "${RESULTS_RANKING_FILE}"
      }

      print_benchmark_summary() {
        echo "Benchmark ranking:"
        cat "${RESULTS_RANKING_FILE}"

        echo "Variance warnings:"
        if ! awk -F'\t' 'NR > 1 && $9 == "high-variance" { print }' "${RESULTS_RANKING_FILE}"; then
          :
        fi

        if ! awk -F'\t' 'NR > 1 && $9 == "high-variance" { found = 1 } END { exit found ? 0 : 1 }' "${RESULTS_RANKING_FILE}"; then
          echo "none"
        fi
      }

      run_framework() {
        local round="$1"
        local framework="$2"
        local workdir="$3"
        local command="$4"
        local output_file="${LOG_DIR}/${framework}-round-${round}-k6.txt"
        local server_log="${LOG_DIR}/${framework}-round-${round}.log"
        local result_requests
        local latency_p50
        local latency_p95
        local latency_p99

        cleanup_framework() {
          stop_server "${framework}"
          docker compose -f "${COMPOSE_DIR}/docker-compose.yml" down >/dev/null 2>&1 || true
        }

        trap cleanup_framework RETURN

        echo "[$(date --iso-8601=seconds)] Running benchmark round ${round}/${BENCHMARK_ROUNDS} for ${framework}"
        docker compose -f "${COMPOSE_DIR}/docker-compose.yml" up -d --remove-orphans
        wait_for_postgres

        pushd "${workdir}" >/dev/null
        bash -lc "exec taskset --cpu-list ${APP_CPUSET} ${command}" >"${server_log}" 2>&1 &
        local server_pid=$!
        popd >/dev/null

        printf '%s\n' "${server_pid}" > "${LOG_DIR}/${framework}.pid"

        wait_for_server "${framework}"
        taskset --cpu-list "${K6_CPUSET}" k6 run "${K6_SCRIPT}" | tee "${output_file}"
        result_requests=$(extract_summary_value "measured cycle requests" "${output_file}")
        latency_p50=$(extract_summary_value "measured cycle latency p50 ms" "${output_file}")
        latency_p95=$(extract_summary_value "measured cycle latency p95 ms" "${output_file}")
        latency_p99=$(extract_summary_value "measured cycle latency p99 ms" "${output_file}")

        if [ -z "${result_requests}" ] || [ -z "${latency_p50}" ] || [ -z "${latency_p95}" ] || [ -z "${latency_p99}" ]; then
          echo "Unable to extract measured cycle requests for ${framework}" >&2
          return 1
        fi

        printf '%s\t%s\t%s\t%s\t%s\t%s\n' \
          "${round}" \
          "${framework}" \
          "${result_requests}" \
          "${latency_p50}" \
          "${latency_p95}" \
          "${latency_p99}" \
          | tee -a "${RAW_RESULTS_FILE}"
        trap - RETURN
        cleanup_framework
      }

      frameworks=(
        "go|${REPO_DIR}/go|env ${GO_BENCH_ENV} ./server"
        "go-pgo|${REPO_DIR}/go|env ${GO_BENCH_ENV} ./server_pgo"
        "micronaut4|${REPO_DIR}/micronaut4|java ${JVM_BENCH_OPTS} -jar target/micronaut4.jar"
        "micronaut4-virtual|${REPO_DIR}/micronaut4|java ${JVM_BENCH_OPTS} -Dfruit.virtual-threads.enabled=true -jar target/micronaut4.jar"
        "micronaut5|${REPO_DIR}/micronaut5|java ${JVM_BENCH_OPTS} -jar target/micronaut5.jar"
        "micronaut5-virtual|${REPO_DIR}/micronaut5|java ${JVM_BENCH_OPTS} -Dfruit.virtual-threads.enabled=true -jar target/micronaut5.jar"
        "quarkus3|${REPO_DIR}/quarkus3|java ${JVM_BENCH_OPTS} -jar target/quarkus-app/quarkus-run.jar"
        "quarkus3-spring-compatibility|${REPO_DIR}/quarkus3-spring-compatibility|java ${JVM_BENCH_OPTS} -jar target/quarkus-app/quarkus-run.jar"
        "quarkus3-virtual|${REPO_DIR}/quarkus3-virtual|java ${JVM_BENCH_OPTS} -jar target/quarkus-app/quarkus-run.jar"
        "springboot4|${REPO_DIR}/springboot4|java ${JVM_BENCH_OPTS} -jar target/app-jvm.jar"
        "springboot4-virtual|${REPO_DIR}/springboot4|java ${JVM_BENCH_OPTS} -Dspring.threads.virtual.enabled=true -jar target/app-jvm.jar"
        "springboot4-aot|${REPO_DIR}/springboot4|java ${JVM_BENCH_OPTS} -Dspring.aot.enabled=true -jar target/springboot4.jar"
      )

      framework_names=()
      tune_host_for_benchmarks

      for entry in "${frameworks[@]}"; do
        IFS='|' read -r framework _ <<< "${entry}"
        framework_names+=("${framework}")
      done

      for round in $(seq 1 "${BENCHMARK_ROUNDS}"); do
        mapfile -t shuffled_frameworks < <(printf '%s\n' "${frameworks[@]}" | shuf)

        for entry in "${shuffled_frameworks[@]}"; do
          IFS='|' read -r framework workdir command <<< "${entry}"
          run_framework "${round}" "${framework}" "${workdir}" "${command}"
        done
      done

      for framework in "${framework_names[@]}"; do
        summarize_framework_results "${framework}"
      done

      build_ranking_report
      print_benchmark_summary

      echo "Benchmark run details written to ${RAW_RESULTS_FILE}"
      echo "Benchmark summary written to ${RESULTS_FILE}"
      echo "Benchmark ranking written to ${RESULTS_RANKING_FILE}"

runcmd:
  - [cloud-init-per, once, benchmark-bootstrap, /usr/local/bin/bootstrap-benchmark-host.sh]

final_message: "cloud-init finished after $UPTIME seconds. Review /var/log/bootstrap-benchmark-host.log for the benchmark host bootstrap log."